<div class="m-2 flex min-w-full items-start justify-center p-2 md:m-5 md:p-5">
  <div
    class="inset-2 flex min-w-full items-center justify-start gap-4 rounded-2xl border-2 bg-accent p-2"
  >
    <button
      hlmBtn
      variant="outline"
      class="group flex shrink-0 items-center gap-2 border-2 border-b-emerald-600 text-emerald-800 transition-colors duration-500 hover:border-emerald-700 hover:text-emerald-900"
    >
      <span class="hidden font-extrabold min-[600px]:inline">New Car</span>
      <svg
        lucideCirclePlus
        class="h-5 w-5 stroke-3 transition-all duration-400 ease-out group-hover:scale-110"
      ></svg>
    </button>
    <button
      hlmBtn
      variant="outline"
      class="group flex shrink-0 items-center gap-2 border-2 border-b-violet-400 text-violet-500 transition-colors duration-500 hover:border-violet-600 hover:text-violet-900"
    >
      <span class="hidden font-extrabold min-[600px]:inline">Generate Cars</span>
      <svg
        lucideCog
        class="h-5 w-5 stroke-3 transition-all duration-400 group-hover:rotate-180"

    <span class="flex-1"></span>
    <button
      hlmBtn
      variant="outline"
      class="group flex shrink-0 items-center gap-2 border-2 border-b-amber-400 text-amber-600 transition-colors duration-500 hover:border-amber-700 hover:text-amber-700"

      <svg
        lucideFlag
        class="h-5 w-5 stroke-3 transition-all duration-300 ease-out group-hover:rotate-12 group-hover:animate-pulse"
      ></svg>
    </button>
    <button
      hlmBtn
      variant="outline"
      class="group flex shrink-0 items-center gap-2 border-2 border-b-rose-500 text-rose-500 transition-colors duration-300 hover:border-rose-600 hover:text-rose-700"

      <svg
        lucideRotateCcw
