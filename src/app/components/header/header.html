<div class="container mx-auto flex items-center justify-between px-4 py-1.5 sm:px-8">
  <a
    routerLink="/garage"
    class="group inline-flex items-center gap-3 rounded-xl border border-border/60 bg-card/80 py-1.5 pr-3 pl-1.5 shadow-xs transition-all hover:border-primary/50 hover:bg-accent/50 hover:shadow-sm active:scale-[0.98]"
    aria-label="AsyncRace Home"
  >
    <div
      class="relative flex items-center justify-center overflow-hidden rounded-lg bg-slate-900 p-1 ring-1 ring-white/10 transition-transform group-hover:scale-105"
    >
      <img
        ngSrc="car-logo.svg"
        alt="AsyncRace Logo"
        width="80"
        height="40"
        priority
        class="object-contain"
      />
    </div>

    <span class="flex items-center text-sm font-black tracking-wide">
      <span class="text-foreground transition-colors group-hover:text-foreground">ASYNC</span>
      <span class="ml-0.5 text-primary">RACE</span>
    </span>
  </a>

  <nav
    class="hidden items-center gap-1.5 rounded-full border border-border/60 bg-muted/40 p-1 shadow-inner md:flex"
    aria-label="Main Navigation"
  >
    <a
      routerLink="/garage"
      routerLinkActive="bg-background text-foreground shadow-xs border-border/80"
      [routerLinkActiveOptions]="{ exact: true }"
      hlmBtn
      variant="ghost"
      size="sm"
      class="flex items-center gap-2 rounded-full border border-transparent px-4 py-1.5 text-sm font-medium text-muted-foreground transition-all duration-150 hover:bg-background/50 hover:text-foreground"
    >
      <svg lucideCarFront class="h-4 w-4 shrink-0 text-primary"></svg>
      <span>Garage</span>
    </a>

    <a
      routerLink="/winners"
      routerLinkActive="bg-background text-foreground shadow-xs border-border/80"
      hlmBtn
      variant="ghost"
      size="sm"
      class="flex items-center gap-2 rounded-full border border-transparent px-4 py-1.5 text-sm font-medium text-muted-foreground transition-all duration-150 hover:bg-background/50 hover:text-foreground"
    >
      <svg lucideTrophy class="h-4 w-4 shrink-0 text-amber-500"></svg>
      <span>Winners</span>
    </a>
  </nav>

  <hlm-dialog class="md:hidden" #navmenu>
    <button
      hlmBtn
      variant="ghost"
      size="icon"
      hlmDialogTrigger
      class="rounded-lg border border-border/50"
      aria-label="Open navigation menu"
    >
      <svg lucideMenu class="h-4 w-4 text-primary"></svg>
    </button>

    <hlm-dialog-content
      *hlmDialogPortal
      class="inset-0 flex h-screen w-screen max-w-none flex-col items-start justify-start rounded-none border-none bg-background/98 p-8 backdrop-blur-md"
    >
      <div class="w-full border-b border-border/40 pb-4">
        <span class="text-sm font-bold tracking-wide text-foreground"> ASYNC RACE </span>
      </div>

      <nav
        class="mt-8 flex flex-col items-start justify-start gap-6"
        aria-label="Mobile Navigation"
      >
        <a
          routerLink="/garage"
          routerLinkActive="scale-105 text-primary font-black"
          hlmDialogClose
          class="flex items-center gap-3 text-xl font-bold tracking-tight text-muted-foreground transition-all hover:scale-105 hover:text-foreground"
          (click)="navmenu.close()"
        >
          <svg lucideCarFront class="h-5 w-5 text-primary"></svg>
          Garage
        </a>

        <a
          routerLink="/winners"
          routerLinkActive="scale-105 text-primary font-black"
          hlmDialogClose
          class="flex items-center gap-3 text-xl font-bold tracking-tight text-muted-foreground transition-all hover:scale-105 hover:text-foreground"
          (click)="navmenu.close()"
        >
          <svg lucideTrophy class="h-5 w-5 text-amber-500"></svg>
          Winners
        </a>
      </nav>
    </hlm-dialog-content>
  </hlm-dialog>
</div>
